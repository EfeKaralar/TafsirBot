services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: tafsirbot-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  postgres:
    image: postgres:15-alpine
    container_name: tafsirbot-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tafsir_bot}
      POSTGRES_USER: ${POSTGRES_USER:-tafsirbot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tafsirbot_dev_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tafsirbot} -d ${POSTGRES_DB:-tafsir_bot}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  qdrant_data:
  postgres_data:
